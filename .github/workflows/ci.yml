name: CI

on:
  push:
    paths-ignore:
      - '**/README.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/README.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - run: pnpm dev:prepare
      - run: pnpm typecheck
      - run: pnpm run --if-present test:attw

  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - run: pnpm dev:prepare
      - run: pnpm build

  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - run: pnpm dev:prepare

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-ubuntu-24.04-arm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright-core install chromium
        continue-on-error: true

      - run: pnpm run --if-present prepare:fixtures
      - run: pnpm vitest run --project typecheck --project unit --project e2e --project nuxt-runtime

  nitro-3:
    runs-on: ubuntu-24.04-arm
    name: Nitro 3 compatibility
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - name: Install Nuxt 5
        run: |
          pnpm add --workspace-root --save-dev "nuxt@npm:nuxt-nightly@5.0.0-29738334.1405742f" "@nuxt/kit@npm:@nuxt/kit-nightly@5.0.0-29738334.1405742f"
          pnpm --filter @nuxt/scripts add --save-dev "@nuxt/kit@npm:@nuxt/kit-nightly@5.0.0-29738334.1405742f"
      - run: pnpm --filter @nuxt/scripts dev:prepare
      - run: pnpm exec nuxt prepare
      - run: pnpm vitest run --project e2e test/e2e/proxy-alias.test.ts -t 'auto-injects|resolves'
