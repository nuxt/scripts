  '@nuxt/ui': ^4.7.1
  '@nuxtjs/partytown': ^2.0.0
  '@paypal/paypal-js': ^9.7.0
  '@shikijs/langs': ^4.1.0
  '@shikijs/themes': ^4.1.0
  '@types/google.maps': ^3.64.1
  '@types/jest-image-snapshot': ^6.4.1
  '@types/youtube': ^0.2.0
  '@vue/test-utils': ^2.4.10
  '@vueuse/core': ^14.3.0
  '@vueuse/shared': ^14.3.0
  bumpp: ^11.1.0
